site_name: Git & GitHub Guide
site_description: Guida completa a Git e GitHub
site_author: Fabrizio Biscossi

theme:
  name: material
  features:
    - content.code.copy

nav:
  - Home: index.md
  - Parte 1 - Fondamenta: 01-fondamenta/parte-1-fondamenta.md
  - Parte 2 - Workflow Base: 02-workflow-base/parte-2-workflow-base.md
  - Parte 3 - GitHub Remoto: 03-github-remoto/parte-3-github.md
  - Parte 4 - Workflow Reali: 04-workflow-reali/parte-4-workflow-reali.md
  - Parte 5 - Best Practices: 05-best-practices/parte-5-best-practices.md
  - Parte 6 - Troubleshooting: 06-troubleshooting/parte-6-troubleshooting.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search